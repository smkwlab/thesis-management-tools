---
name: Student Repository Management
"on":
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      force_update:
        description: 'Force update all registries'
        required: false
        default: 'false'
        type: boolean

jobs:
  manage-repositories:
    runs-on: ubuntu-latest
    # リポジトリ登録依頼のIssueのみで実行
    if: >
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.issue.title || '', 'リポジトリ登録依頼')
    env:
      # 規約: <org>/thesis-student-registry。逸脱時のみ org/repo variable
      # REGISTRY_REPO で override（ECOSYSTEM.md: Organization-Scoped Deployment）。
      # checkout と script の両方がこの単一定義を参照する
      REGISTRY_REPO: ${{ vars.REGISTRY_REPO || format('{0}/thesis-student-registry', github.repository_owner) }}
    steps:
      # GitHub App の installation token を毎回発行する（PAT の無通知失効を排除）。
      # owner 指定で org 内の全アクセス可能リポジトリ（this repo / registry / 学生
      # リポジトリ）に効く cross-repo token を得る。
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          token: ${{ steps.app-token.outputs.token }}
      - name: Checkout registry data repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: ${{ env.REGISTRY_REPO }}
          path: thesis-student-registry
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup GitHub CLI
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          type -p gh >/dev/null || (
            curl -fsSL \
              https://cli.github.com/packages/githubcli-archive-keyring.gpg | \
              sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
            echo "deb [arch=$(dpkg --print-architecture) \
              signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] \
              https://cli.github.com/packages stable main" | \
              sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
            sudo apt update
            sudo apt install gh jq
          )
          # GitHub CLI認証確認
          echo "Verifying GitHub CLI authentication..."
          gh auth status
          echo "✅ Using GitHub App installation token (cross-repo enabled)"

      - name: Process repository request
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          if [ "${{ github.event_name }}" = "issues" ]; then
            # 単一Issue処理
            echo "🎯 単一Issue処理モード"
            echo "Issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}"

            # process-pending-issues.shを使用してIssue処理
            # 制限を1件に設定して該当Issueのみ処理
            if bash scripts/process-pending-issues.sh --limit 1; then
              echo "✅ Issue処理完了"
              echo "PROTECTION_SUCCESS=true" >> "$GITHUB_ENV"

              # 学生ID抽出（環境変数設定用）
              student_id=$(echo "$ISSUE_BODY" | grep -oE 'k[0-9]{2}(rs|jk|gjk)[0-9]+' | head -1 || true)
              if [ -n "$student_id" ]; then
                echo "STUDENT_ID=$student_id" >> "$GITHUB_ENV"
              fi

              # リポジトリタイプ判定
              issue_title="${{ github.event.issue.title }}"
              if [[ "$issue_title" == *"-wr"* ]]; then
                echo "REPO_TYPE=wr" >> "$GITHUB_ENV"
              elif [[ "$issue_title" == *"-sotsuron"* ]]; then
                echo "REPO_TYPE=sotsuron" >> "$GITHUB_ENV"
              elif [[ "$issue_title" == *"-master"* || "$issue_title" == *"-thesis"* ]]; then
                echo "REPO_TYPE=master" >> "$GITHUB_ENV"
              fi
            else
              echo "❌ Issue処理失敗"
              echo "PROTECTION_SUCCESS=false" >> "$GITHUB_ENV"
              # 失敗を run の結論に反映する（issue #473）
              exit 1
            fi
          else
            # 一括処理モード
            echo "📋 一括処理モード"
            if bash scripts/process-pending-issues.sh; then
              echo "✅ 一括処理完了"
              echo "PROTECTION_SUCCESS=true" >> "$GITHUB_ENV"
            else
              echo "❌ 一括処理失敗"
              echo "PROTECTION_SUCCESS=false" >> "$GITHUB_ENV"
              # 失敗を run の結論に反映する（issue #473）
              exit 1
            fi
          fi

      - name: Summary
        # 失敗時もサマリを出す（step 失敗で後続が skip されないよう always）
        if: always() && env.PROTECTION_SUCCESS != ''
        run: |
          if [ "${PROTECTION_SUCCESS}" != "true" ]; then
            echo "❌ 処理に失敗しました。詳細は Process repository request のログと job summary を参照してください。"
            echo "対象Issue: #${{ github.event.issue.number }}"
            exit 0
          fi
          echo "✅ 処理完了サマリー"
          echo "処理されたIssue: #${{ github.event.issue.number }}"
          echo "学生ID: ${{ env.STUDENT_ID }}"
          echo "リポジトリタイプ: ${{ env.REPO_TYPE }}"
          echo "完了時刻: $(date '+%Y-%m-%d %H:%M:%S UTC')"
          echo
          echo "📋 process-pending-issues.sh が以下の処理を完了:"
          echo "  - リポジトリ存在確認"
          echo "  - ブランチ保護設定 (論文リポジトリのみ)"
          echo "  - thesis-student-registry 更新"
          echo "  - Issue クローズ"
